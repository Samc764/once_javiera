<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Tarjeta de Perfil</title>
  <link rel="stylesheet" href="flexbox.css">
</head>
<body>
  
  <div class="tarjeta">
    
    <!-- Sección superior -->
    <div class="perfil-header">
      <img src="https://picsum.photos/150/150" alt="avatar">
      <div>
        <strong>Lyam Cardona</strong><br>
        <span>@lyam.dev</span>
      </div>
    </div>
    
    <!-- Bio -->
    <p class="bio">
      soy samu un chico tranquilo, y espero estudiar filologia en la u de antioquia.
    </p>
    
    <!-- Estadísticas -->
    <div class="estadisticas">
      <div>
        <span>24</span>
        Proyectos
      </div>
      <div>
        <span>1.2K</span>
        Seguidores
      </div>
      <div>
        <span>180</span>
        Siguiendo
      </div>
    </div>
    
    <!-- Botones -->
    <div class="botones">
      <button class="seguir">Seguir</button>
      <button class="mensaje">Mensaje</button>
    </div>
    
    <!-- Miniaturas -->
    <div class="miniaturas">
      <img src="https://picsum.photos/100?1" alt="proyecto 1">
      <img src="https://picsum.photos/100?2" alt="proyecto 2">
      <img src="https://picsum.photos/100?3" alt="proyecto 3">
    </div>
    
  </div>

</body>
</html>
